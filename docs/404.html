<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>404 — InterDet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root { --cyan: #00D2FF; --bg: #05050A; --text: #E8E8F5; --muted: #8B92A5; --radius: 4px; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
nav{padding:16px 24px;border-bottom:1px solid rgba(0, 210, 255, 0.15);}
.nav-brand{display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.15rem;}
.brand-icon{width:32px;height:32px;background:var(--cyan);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#000;}
.page-404{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:24px;}
.glitch-404{font-family:'JetBrains Mono',monospace;font-size:clamp(5rem,15vw,10rem);font-weight:700;line-height:1;color:var(--cyan);text-shadow:0 0 40px rgba(0,210,255,.4);}
.err-title{font-size:1.5rem;font-weight:600;font-family:'JetBrains Mono',monospace;}
.err-sub{font-size:1rem;color:var(--muted);max-width:400px;line-height:1.6}
.cta-btn{padding:18px 44px;background:var(--cyan);color:#000;font-weight:700;border-radius:var(--radius);cursor:pointer;font-family:'JetBrains Mono',monospace;text-transform:uppercase;border:none;}
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><div class="brand-icon">ID</div>InterDet</div>
</nav>

<div class="page-404">
  <div class="glitch-404">404</div>
  <div class="err-title" data-i18n="err_title">Signal Lost</div>
  <div class="err-sub" data-i18n="err_sub">This page drifted into the network void.</div>
  <button class="cta-btn" onclick="window.location.href='index (1).html'">
    <span data-i18n="go_home">Go Home</span>
  </button>
</div>

<script>
const STRINGS = {
  en:{ err_title:"Signal Lost", err_sub:"This page drifted into the network void.", go_home:"Go Home" },
  ru:{ err_title:"Сигнал потерян", err_sub:"Эта страница ушла в сетевой вакуум.", go_home:"На главную" },
  es:{ err_title:"Señal perdida", err_sub:"Esta página vagó hacia el vacío de la red.", go_home:"Inicio" },
  de:{ err_title:"Signal verloren", err_sub:"Diese Seite ist im Netzwerk-Vakuum gelandet.", go_home:"Zur Startseite" },
  fr:{ err_title:"Signal perdu", err_sub:"Cette page a dérivé dans le vide du réseau.", go_home:"Accueil" },
  tr:{ err_title:"Sinyal Kayboldu", err_sub:"Bu sayfa ağ boşluğuna sürüklendi.", go_home:"Ana Sayfa" },
  pl:{ err_title:"Sygnał utracony", err_sub:"Ta strona dryfowała w próżnię sieci.", go_home:"Główna" },
  uk:{ err_title:"Сигнал втрачено", err_sub:"Ця сторінка пішла в мережевий вакуум.", go_home:"На головну" }
};

(function() {
  const lang = localStorage.getItem('app_lang') || 'en';
  const data = STRINGS[lang] || STRINGS['en'];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = data[el.getAttribute('data-i18n')];
  });
})();
</script>
</body>
</html>
