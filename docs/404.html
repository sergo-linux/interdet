<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>404 | InterDet</title>
    <!-- Подключаем те же стили, что и в index.html, через абсолютный путь -->
    <link rel="stylesheet" href="/style.css"/> 
    <style>
        .page-404 {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 80vh; text-align: center; padding: 20px;
        }
        .glitch-404 { font-family: 'JetBrains Mono', monospace; font-size: 10rem; color: var(--cyan); }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand"><div class="brand-icon">ID</div> InterDet</div>
    <div class="nav-right">
        <button class="theme-btn" id="theme-toggle">🌙</button>
        <select class="lang-select" id="lang-select">
            <option value="en">EN</option>
            <option value="ru">RU</option>
            <option value="es">ES</option>
            <option value="de">DE</option>
            <option value="fr">FR</option>
            <option value="tr">TR</option>
            <option value="pl">PL</option>
            <option value="uk">UA</option>
        </select>
    </div>
</nav>

<div class="page-404">
    <div class="glitch-404">404</div>
    <h1 class="err-title">Страница не найдена</h1>
    <p class="err-sub">Этот путь не существует в нашей сети. Вернитесь на главную для продолжения диагностики.</p>
    <br>
    <a href="/" class="cta-btn">На главную</a>
</div>

<!-- Подключаем основной скрипт через абсолютный путь -->
<script src="/main.js"></script>
</body>
</html>
